<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
</head>
<body>
    <div id="name"></div>

    <script>
        $.ajax({
            url: 'http://localhost:5000/api/name',
            method: 'get',
            success: function(data) {
	            $('#name').text(data);
            }
        });
    </script>
</body>
</html>
