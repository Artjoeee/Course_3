<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fetch</title>
</head>
<body>
    <div id="name"></div>

    <script>
        fetch('http://localhost:5000/api/name')
        .then(response => response.text())
        .then(text => { 
            document.getElementById("name").innerHTML = text; 
        });
    </script>
</body>
</html>
